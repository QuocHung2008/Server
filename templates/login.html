{% extends "base.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12">
    <div class="w-full max-w-md">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-block relative mb-4">
                <div class="w-16 h-16 bg-blue-600 rounded-lg shadow-md flex items-center justify-center">
                    <i class="fas fa-user-lock text-white text-3xl"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-1">
                Chào mừng trở lại
            </h1>
            <p class="text-slate-500">Đăng nhập để tiếp tục sử dụng hệ thống</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-lg shadow-md border border-slate-200 p-8">
            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <!-- Username -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">
                        Tên đăng nhập
                    </label>
                    <div class="relative">
                        <input 
                            type="text" 
                            name="username" 
                            class="w-full px-4 py-2 pl-10 rounded border border-slate-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors"
                            placeholder="Nhập tên đăng nhập"
                            required
                        >
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">
                        Mật khẩu
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            name="password"
                            id="password"
                            class="w-full px-4 py-2 pl-10 pr-10 rounded border border-slate-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors"
                            placeholder="Nhập mật khẩu"
                            required
                        >
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button 
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded font-bold transition-all duration-200 shadow-sm"
                >
                    Đăng nhập
                </button>
            </form>
            
            <!-- Info Box -->
            <div class="mt-6 pt-6 border-t border-slate-200">
                <div class="bg-blue-50 rounded-lg p-4 border border-blue-100">
                    <div class="flex items-start gap-3">
                        <i class="fas fa-info-circle text-blue-600 text-lg mt-0.5"></i>
                        <div>
                            <p class="font-bold text-blue-800 text-sm mb-1">Tài khoản mặc định</p>
                            <div class="text-sm text-blue-700 space-y-1">
                                <p><span class="font-mono bg-white px-2 py-0.5 rounded border border-blue-200">admin</span> / <span class="font-mono bg-white px-2 py-0.5 rounded border border-blue-200">admin123</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="text-center text-sm text-slate-400 mt-8">
            &copy; 2024 Hệ thống điểm danh thông minh
        </p>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
