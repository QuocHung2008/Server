{% extends "base.html" %}
{% block title %}Điểm danh Real-time{% endblock %}

{% block content %}
<div class="px-4 sm:px-0">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Điểm danh Real-time</h1>
        <button onclick="exportExcel()" class="btn-primary">
            Xuất Excel
        </button>
    </div>

    <div class="card overflow-hidden">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Thời gian</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Họ tên</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Mã SV</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Lớp</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Thiết bị</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Trạng thái</th>
                </tr>
            </thead>
            <tbody id="attendance-table-body" class="bg-white divide-y divide-slate-200">
                <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const socket = io();
    const tbody = document.getElementById('attendance-table-body');

    socket.on('attendance_update', (payload) => {
        const data = payload.data;
        const row = document.createElement('tr');
        row.className = 'bg-blue-50 transition-colors duration-1000';
        
        const statusClass = data.status === 'present' ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100';
        
        row.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${new Date(data.recorded_at).toLocaleTimeString()}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">${data.student_name}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${data.student_code}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${data.class_name}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${data.device_id}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm">
                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">
                    ${data.status}
                </span>
            </td>
        `;
        
        tbody.prepend(row);
        
        // Remove highlight after 3 seconds
        setTimeout(() => {
            row.classList.remove('bg-blue-50');
        }, 3000);
    });

    function exportExcel() {
        window.location.href = '/api/attendance/export';
    }
</script>
{% endblock %}
