{% extends "base.html" %}
{% block title %}Dashboard - Face Recognition{% endblock %}

    <h1 class="text-3xl font-bold text-slate-800 mb-6">Tổng quan hệ thống</h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="card p-6">
            <h3 class="text-lg font-medium text-slate-500">Tổng sinh viên</h3>
            <p class="mt-2 text-3xl font-semibold text-slate-900">120</p>

        <div class="card p-6">

            <p class="mt-2 text-3xl font-semibold text-slate-900">5</p>
        </div>
        <div class="card p-6">
            <h3 class="text-lg font-medium text-slate-500">Thiết bị hoạt động</h3>
            <p class="mt-2 text-3xl font-semibold text-slate-900">2</p>
        </div>
    </div>
</div>
{% endblock %}
